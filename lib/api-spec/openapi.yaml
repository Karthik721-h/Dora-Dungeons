openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Dora Dungeons API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: game
    description: Game operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /game/start:
    post:
      operationId: startGame
      tags: [game]
      summary: Start a new game session
      description: Initializes a new game session and returns the initial game state
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartGameRequest"
      responses:
        "200":
          description: Game started successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameStateResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /game/action:
    post:
      operationId: processAction
      tags: [game]
      summary: Process a game action
      description: Processes a voice command or action string and returns the updated game state
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActionRequest"
      responses:
        "200":
          description: Action processed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameStateResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No active game session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /game/state:
    get:
      operationId: getGameState
      tags: [game]
      summary: Get current game state
      description: Returns the current game state for the active session
      responses:
        "200":
          description: Current game state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameStateResponse"
        "404":
          description: No active game session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the returnTo path on success or /api/login on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Bearer session token (used by mobile clients).
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Session cookie (used by browser clients).
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    StartGameRequest:
      type: object
      properties:
        playerName:
          type: string
          description: Optional player name
    ActionRequest:
      type: object
      properties:
        command:
          type: string
          description: The voice command or action string (e.g. "attack goblin", "move north")
      required:
        - command
    ParsedCommand:
      type: object
      properties:
        action:
          type: string
          description: The parsed action type (e.g. ATTACK, MOVE, DEFEND, CAST_SPELL, LOOK)
        target:
          type: string
          description: The parsed target if any
        direction:
          type: string
          description: Direction for movement commands
        raw:
          type: string
          description: The original raw command string
      required:
        - action
        - raw
    PlayerState:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        hp:
          type: integer
        maxHp:
          type: integer
        mp:
          type: integer
        maxMp:
          type: integer
        level:
          type: integer
        xp:
          type: integer
        xpToNextLevel:
          type: integer
        attack:
          type: integer
        defense:
          type: integer
        abilities:
          type: array
          items:
            type: string
        inventory:
          type: array
          items:
            type: string
      required:
        - id
        - name
        - hp
        - maxHp
        - mp
        - maxMp
        - level
        - xp
        - xpToNextLevel
        - attack
        - defense
        - abilities
        - inventory
    EnemyState:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        hp:
          type: integer
        maxHp:
          type: integer
        attack:
          type: integer
        defense:
          type: integer
        xpReward:
          type: integer
        isDefeated:
          type: boolean
      required:
        - id
        - name
        - hp
        - maxHp
        - attack
        - defense
        - xpReward
        - isDefeated
    RoomState:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        exits:
          type: object
          additionalProperties:
            type: string
        enemies:
          type: array
          items:
            $ref: "#/components/schemas/EnemyState"
        items:
          type: array
          items:
            type: string
        isExplored:
          type: boolean
      required:
        - id
        - name
        - description
        - exits
        - enemies
        - items
        - isExplored
    GameStateResponse:
      type: object
      properties:
        sessionId:
          type: string
        gameStatus:
          type: string
          description: IDLE, IN_COMBAT, EXPLORING, GAME_OVER, VICTORY
        player:
          $ref: "#/components/schemas/PlayerState"
        currentRoom:
          $ref: "#/components/schemas/RoomState"
        logs:
          type: array
          items:
            type: string
          description: Narrative messages describing what happened
        parsedCommand:
          $ref: "#/components/schemas/ParsedCommand"
          description: The command that was parsed (only present on action responses)
        turnCount:
          type: integer
      required:
        - sessionId
        - gameStatus
        - player
        - currentRoom
        - logs
        - turnCount
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message
    AuthUser:
      type: object
      required: [id]
      properties:
        id:
          type: string
        email:
          type: string
          nullable: true
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        profileImageUrl:
          type: string
          nullable: true
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
